<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Vitalis</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="background-overlay"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-heartbeat"></i>
                <span>VITALIS</span>
            </div>
            <p class="auth-subtitle">Sistema de Gestión Clínica</p>

            <div id="alerta-login" class="alerta hidden"></div>

            <form id="form-login" class="auth-form">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="login-correo" required placeholder="correo@vitalis.com">
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" required placeholder="••••••••" minlength="6">
                </div>

                <button type="submit" class="btn-primary btn-full" id="btn-login-submit">
                    <i class="fas fa-sign-in-alt"></i> Ingresar
                </button>
            </form>

            <p class="auth-footer">
                ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
